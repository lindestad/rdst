settings:
  timestep_days: 7
  start_date: 1972-01-01
  end_date: 1976-12-24
  horizon_days: 260
  reporting: daily
  production_level_fraction: 1.0

nodes:
  - id: victoria
    reservoir:
      initial_level: 0
      max_capacity: 100000
    max_production: 1000
    catchment_inflow:
      type: csv
      filepath: inflows/victoria.csv
      column: w1972
    connections:
      - node_id: southwest
        fraction: 1
        delay: 3

  - id: southwest
    reservoir:
      initial_level: 0
      max_capacity: 100000
    max_production: 1000
    catchment_inflow:
      type: csv
      filepath: inflows/southwest.csv
      column: w1972
    connections:
