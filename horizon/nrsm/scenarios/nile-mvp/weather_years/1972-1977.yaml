        fraction: 1
        delay: 2
    modules:
      evaporation:
        rate: 60

  - id: karthoum
    reservoir:
      initial_level: 0
      max_capacity: 100000
    max_production: 1000
    catchment_inflow:
      type: constant
      rate: 12
    connections:
      - node_id: merowe
        fraction: 1
        delay: 1
    modules:
      drink_water:
        daily_demand: 25
      food_production:
        water_coefficient: 0.9090909091
        max_food_units: 22

  - id: merowe
