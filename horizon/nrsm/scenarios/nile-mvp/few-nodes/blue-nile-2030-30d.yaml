      - node_id: roseires
        fraction: 1
        delay: 2
    modules:
      energy:
        price_per_unit: 0.714
        effective_head_m: 145
        turbine_efficiency: 0.9

  - id: tana
    reservoir:
      initial_level: 0
      max_capacity: 100000
    max_production: 1000
    catchment_inflow:
      type: constant
      rate: 178.5
