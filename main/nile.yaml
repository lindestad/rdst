        type: csv
        filepath: modules/food_production/nile_karthoum_water.csv
        column: water_m3_day
        water_coefficient: 850
      energy:
        type: csv
        filepath: modules/energy_price/price_csv/karthoum.csv
        column: price_eur_kwh


