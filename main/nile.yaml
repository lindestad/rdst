settings:
  timestep_days: 1.0
  # Hydraulic efficiency of turbines (used in EUR/kWh → EUR/m³ conversion)
  hydro_efficiency: 0.85

# Effective hydraulic head (m) at each node — proxy for average turbine head.
# Used to convert electricity price (EUR/kWh) to water value (EUR/m³):
#   EUR/m³ = EUR/kWh × ρ·g·h·η / 3 600 000
# Sources: published dam heights / design heads.
#   Victoria  – Nalubaale (Owen Falls) Dam, ~30 m net head
#   southwest – Sudd swamp reach, White Nile gradient, ~5 m (no dam; used for
#               social-value pricing only since max_production = 0)
#   karthoum  – Jebel Aulia Dam Sudan, ~35 m
#   merowe    – Merowe (Hamdab) Dam, ~67 m
#   aswand    – High Aswan Dam (HAD), ~111 m
#   cairo     – Nile Delta / low-head run-of-river, ~15 m
#   singa     – Sennar Dam, ~45 m
#   roseires  – Roseires Dam, ~68 m
#   gerd      – Grand Ethiopian Renaissance Dam, ~145 m
#   tana      – Tis Abay / Lake Tana falls scheme, ~50 m
#   kashm     – Kashm el-Girba Dam, ~60 m
#   tsengh    – Tekeze (Tekezze) Dam, ~188 m
#   ozentari  – small headwater dam, ~50 m

nodes:

  - id: victoria
    latitude: -1.0      # degrees
    longitude: 33.0     # degrees
    area: 238900        # km² — Lake Victoria drainage basin
    effective_head_m: 30.0   # Nalubaale (Owen Falls) Dam
    population: 4.0e7        # approx. — Lake Victoria basin (Uganda/Kenya/Tanzania)
    agri_area_km2: 70000     # approx. — mixed cropland across Victoria basin

    reservoir:
      initial_level: 2.8e11   # m³
      max_capacity:  3.5e11   # m³

    max_production: 5.0e7     # m³/day

    catchment_inflow:
      type: constant
      rate: 3.5e7             # m³/day

    connections:
      - node_id: southwest
        fraction: 1.0
        delay: 18             # days

    modules:
      evaporation: 1.2e7          # m³/day (constant)
      drink_water: 1.0e6          # m³/day (constant)
      food_production:
        type: csv
        filepath: modules/food_production/nile_victoria_water.csv
        column: water_m3_day
        water_coefficient: 650    # m³ / food unit
      energy:
        type: csv
        filepath: modules/energy_price/price_csv/victoria.csv
        column: price_eur_kwh


  - id: southwest
    latitude: 8.5
    longitude: 29.5
    area: 580000        # km² — Sudd / White Nile catchment
    effective_head_m: 5.0    # White Nile gradient through Sudd (~5 m, used for social pricing)
    population: 8.0e6        # approx. — South Sudan / Sudd region
    agri_area_km2: 20000     # approx. — limited subsistence farming, Sudd margins

    reservoir:
      initial_level: 6.0e9
      max_capacity: 1.0e10

    max_production: 0.0           # m³/day

    catchment_inflow:
      type: constant
      rate: 2.2e7

    connections:
      - node_id: karthoum
        fraction: 1.0
        delay: 13

    modules:
      evaporation: 1.0e6          # m³/day (constant)
      drink_water: 6.0e5          # m³/day (constant)
      food_production:
        type: csv
        filepath: modules/food_production/nile_southwest_water.csv
        column: water_m3_day
        water_coefficient: 700
      energy:
        type: csv
        filepath: modules/energy_price/price_csv/southwest.csv
        column: price_eur_kwh


  - id: karthoum
    latitude: 15.6
    longitude: 32.6
    area: 45000         # km² — local catchment around Khartoum confluence
    effective_head_m: 35.0   # Jebel Aulia Dam area
    population: 7.0e6        # approx. — Khartoum metropolitan area
    agri_area_km2: 5000      # approx. — irrigated strips along the Nile near Khartoum

    reservoir:
